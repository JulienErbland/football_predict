name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        # all_matches.parquet is not in the repo; tests that need it skip
        # cleanly. Suite still exercises metrics, form-alignment fixtures,
        # name-consistency, and the leakage-property checks.
        run: pytest backend/tests/ -v --cov=backend --cov-report=term-missing

      - name: Smoke test (sandboxed)
        # Exercises the full ingestion → features → train → eval → predict
        # pipeline against synthetic data, in an isolated sandbox so even a
        # bug in the runner can't touch real data in backend/data/.
        run: python tools/pipeline_test.py --sandbox-dir tmp_ci_smoke/
